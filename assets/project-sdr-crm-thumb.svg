<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="SDR CRM project thumbnail">
  <rect width="800" height="500" fill="#FCFBF7"/>

  <!-- Corner accents -->
  <path d="M760,40 L760,80 M760,40 L720,40" stroke="#B8860B" stroke-width="2" fill="none"/>
  <path d="M40,460 L40,420 M40,460 L80,460" stroke="#B8860B" stroke-width="2" fill="none"/>

  <!-- Eyebrow -->
  <text x="60" y="80" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#B8860B" letter-spacing="3">CASE STUDY 01</text>

  <!-- Pipeline visualization: 7 stages, third one gold -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="44" height="40" fill="none" stroke="#000C24" stroke-width="1.5" rx="3"/>
    <rect x="56" y="0" width="44" height="40" fill="none" stroke="#000C24" stroke-width="1.5" rx="3"/>
    <rect x="112" y="0" width="44" height="40" fill="#B8860B" rx="3"/>
    <rect x="168" y="0" width="44" height="40" fill="none" stroke="#000C24" stroke-width="1.5" rx="3"/>
    <rect x="224" y="0" width="44" height="40" fill="none" stroke="#000C24" stroke-width="1.5" rx="3"/>
    <rect x="280" y="0" width="44" height="40" fill="none" stroke="#000C24" stroke-width="1.5" rx="3"/>
    <rect x="336" y="0" width="44" height="40" fill="none" stroke="#000C24" stroke-width="1.5" rx="3"/>
  </g>

  <!-- Display headline -->
  <text x="60" y="290" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="80" font-weight="900" fill="#000C24" letter-spacing="-3">SDR CRM</text>

  <!-- Cost callout -->
  <text x="60" y="365" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="44" font-weight="900" fill="#B8860B" letter-spacing="-1">$65/mo</text>
  <text x="240" y="362" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#000C24" opacity="0.65">vs $750 Salesforce</text>

  <!-- Footnote -->
  <text x="60" y="435" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#000C24" letter-spacing="2.5" opacity="0.85">BUILT IN ONE DAY · CLAUDE CODE · GOOGLE SHEETS</text>
</svg>
